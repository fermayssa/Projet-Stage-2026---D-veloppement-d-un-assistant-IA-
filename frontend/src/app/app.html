<div class="app-layout">

  <header class="app-header">
    <div class="header-left">
      <div class="logo-mark">V</div>
      <div class="brand">
        <span class="brand-name">Vermeg Document Assistant</span>
        <span class="brand-sub">Assistant documentaire intelligent</span>
      </div>
    </div>
    <div class="header-center">
      <span class="project-name">Projet de stage — RAG multimodal</span>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Système actif</span>
      </div>
      <button class="icon-btn" title="Paramètres">⚙</button>
      <button class="icon-btn"
              title="Changer de thème"
              (click)="themeService.toggle()">
        {{ themeService.theme() === 'light' ? '🌙' : '☀️' }}
      </button>
      <div class="user-avatar" title="Utilisateur">M</div>
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar"
       appResizable="right"
       [minWidth]="220"
       [maxWidth]="480"
       [defaultWidth]="260"
       storageKey="sidebar-width">
      <nav class="sidebar-nav">
        <div *ngFor="let item of navItems" class="nav-block">
          <button class="nav-item"
                  [class.active]="activeSection === item.id"
                  (click)="selectSection(item.id)">
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label">{{ item.label }}</span>
            <span class="nav-chevron" *ngIf="item.expandable">
              {{ documentsExpanded ? '▾' : '▸' }}
            </span>
          </button>
          <div class="nav-panel" *ngIf="item.id === 'documents' && documentsExpanded">
            <app-upload></app-upload>
          </div>
        </div>
      </nav>
      <div class="sidebar-actions">
        <button class="action-btn primary" (click)="nouveauCorpus()">Nouveau corpus</button>
        <button class="action-btn" (click)="importer()">Importer</button>
        <button class="action-btn danger" (click)="supprimer()">Supprimer</button>
      </div>
    </aside>

    <section class="chat-section">
      <app-chat></app-chat>
    </section>

    <aside class="studio-sidebar"
       appResizable="left"
       [minWidth]="220"
       [maxWidth]="420"
       [defaultWidth]="260"
       storageKey="studio-width">
      <app-studio></app-studio>
    </aside>
  </main>

</div>
