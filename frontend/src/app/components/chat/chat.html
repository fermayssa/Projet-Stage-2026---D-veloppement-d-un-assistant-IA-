<div class="chat-container">

  <div class="chat-header">
    <h2>Assistant RAG</h2>
    <button class="clear-btn" (click)="clearChat()" *ngIf="messages.length > 0">
      Effacer
    </button>
  </div>

  <div class="messages-zone">

    <div *ngIf="messages.length === 0" class="welcome">
      <p class="welcome-title">Importez des documents puis posez vos questions</p>
      <div class="starters">
        <button *ngFor="let p of starterPrompts" class="starter-chip" (click)="sendMessage(p)">
          {{ p }}
        </button>
      </div>
    </div>

    <div *ngFor="let msg of messages; let last = index === messages.length - 1"
         class="message-block"
         [class.user]="msg.role === 'user'">

      <div class="message-label" *ngIf="msg.role === 'user'">Question</div>
      <div class="message-label" *ngIf="msg.role === 'assistant'">Réponse</div>

      <div class="bubble" [class.user-bubble]="msg.role === 'user'">
        {{ msg.content }}
      </div>

      <div *ngIf="msg.sources && msg.sources.length > 0" class="sources-block">
        <div class="sources-label">Sources utilisées</div>

        <div *ngFor="let src of msg.sources" class="source-card">
          <div class="source-top">
            <span class="source-file">📄 {{ src.filename }}</span>
          </div>
          <div class="source-bottom">
            <div class="relevance-bar">
              <div class="relevance-fill" [style.width.%]="scorePercent(src.score)"></div>
            </div>
            <span class="relevance-percent">{{ scorePercent(src.score) }}%</span>
          </div>
          <p class="source-preview">{{ src.text_preview }}</p>
        </div>
      </div>

      <div *ngIf="msg.role === 'assistant' && last" class="suggestions-block">
        <div class="suggestions-label">Suggestions</div>
        <div class="suggestion-chips">
          <button *ngFor="let s of followUpSuggestions" class="suggestion-chip" (click)="sendMessage(s)">
            {{ s }}
          </button>
        </div>
      </div>

    </div>

    <div *ngIf="isLoading" class="message-block">
      <div class="message-label">Réponse</div>
      <div class="bubble loading-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

  </div>

  <div class="input-zone">
    <div class="input-toolbar">
      <button class="tool-btn" title="Ajouter un document">📎</button>
      <button class="tool-btn" title="Ajouter une image">📷</button>
      <button class="tool-btn" title="Choisir parmi les documents">📄</button>
    </div>
    <textarea
      [(ngModel)]="currentQuestion"
      (keydown)="onKeyDown($event)"
      placeholder="Posez votre question..."
      rows="1"
      [disabled]="isLoading">
    </textarea>
    <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !currentQuestion.trim()">
      ➤
    </button>
  </div>

</div>
